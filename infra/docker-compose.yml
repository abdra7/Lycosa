name: lycosa

# env layering (ADR-022): compose-defaults.env is committed and makes a fresh
# clone run with zero configuration; the root .env is optional and overrides
# it (the installer generates one with strong secrets, ENVIRONMENT=production).
x-env-files: &env-files
  - path: ./compose-defaults.env
  - path: ../.env
    required: false

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    env_file: *env-files
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # localhost-only: reachable by tooling on this machine, not the LAN
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lycosa} -d $${POSTGRES_DB:-lycosa}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lycosa

  qdrant:
    image: qdrant/qdrant:v1.18.2
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      # localhost-only: qdrant has no auth by default; the API reaches it
      # over the internal network
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    healthcheck:
      # qdrant image ships no curl/wget; probe the HTTP port over /dev/tcp
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lycosa

  # Optional (ADR-027): started only with `--profile redis`. Shares the
  # rate-limit / failed-login windows across uvicorn workers; the API uses it
  # only when REDIS_URL is set (e.g. redis://redis:6379/0 in the root .env).
  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    restart: unless-stopped
    logging: *default-logging
    ports:
      # localhost-only: redis has no auth here; the API reaches it over the
      # internal network
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lycosa

  api:
    build: ../backend
    env_file: *env-files
    restart: unless-stopped
    logging: *default-logging
    # WORKERS>1 requires REDIS_URL + the redis profile (ADR-028); the app
    # fails fast otherwise ($$ defers expansion to the container shell)
    command: >
      sh -c "alembic upgrade head
      && python scripts/seed_admin.py
      && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers $${WORKERS:-1}"
    volumes:
      # first-run generated secrets (data/runtime-secrets.json) survive restarts
      - api_data:/srv/lycosa/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - lycosa

  prometheus:
    image: prom/prometheus:v3.13.1
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      # localhost-only: Grafana proxies queries over the internal network
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lycosa

  grafana:
    image: grafana/grafana:13.1.0
    # without a root .env Grafana uses its stock admin/admin login and forces
    # a password change on first sign-in; set GF_SECURITY_ADMIN_* to override
    # (only the operator .env here — Grafana has no use for the DB defaults)
    env_file:
      - path: ../.env
        required: false
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lycosa

volumes:
  postgres_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  api_data:

networks:
  lycosa:
    driver: bridge
