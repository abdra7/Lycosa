name: lycosa

services:
  postgres:
    image: postgres:16-alpine
    env_file: ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lycosa} -d $${POSTGRES_DB:-lycosa}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lycosa

  qdrant:
    image: qdrant/qdrant:v1.14.1
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      # qdrant image ships no curl/wget; probe the HTTP port over /dev/tcp
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lycosa

  api:
    build: ../backend
    env_file: ../.env
    command: >
      sh -c "alembic upgrade head
      && python scripts/seed_admin.py
      && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - lycosa

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lycosa

  grafana:
    image: grafana/grafana:11.1.0
    # admin credentials come from GF_SECURITY_ADMIN_USER / GF_SECURITY_ADMIN_PASSWORD in .env
    env_file: ../.env
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lycosa

volumes:
  postgres_data:
  qdrant_data:
  prometheus_data:
  grafana_data:

networks:
  lycosa:
    driver: bridge
