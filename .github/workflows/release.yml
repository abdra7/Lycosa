name: Release

# Triggered by pushing a version tag (e.g. v0.1.0):
#   1. builds and pushes the backend Docker image to GHCR
#   2. builds the desktop dashboard installers for macOS / Windows / Linux
#   3. creates a GitHub Release with the installers attached and notes
#      extracted from CHANGELOG.md

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  backend-image:
    name: Backend Docker image → GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lycosa-backend:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/lycosa-backend:latest

  desktop-macos:
    name: Desktop installer (macOS .dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: dashboard
        run: |
          flutter pub get
          flutter build macos --release

      - name: Package .dmg
        working-directory: dashboard
        run: |
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          STAGE=$(mktemp -d)
          cp -R "$APP" "$STAGE/Lycosa.app"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Lycosa" -srcfolder "$STAGE" -ov -format UDZO \
            "Lycosa-macos-${{ steps.ver.outputs.version }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: dashboard/Lycosa-macos-*.dmg
          if-no-files-found: error

  desktop-windows:
    name: Desktop installer (Windows .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: dashboard
        run: |
          flutter pub get
          flutter build windows --release

      - name: Bundle VC++ runtime DLLs
        working-directory: dashboard
        shell: pwsh
        run: |
          $dest = "build\windows\x64\runner\Release"
          foreach ($dll in "msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll") {
            Copy-Item "$env:SystemRoot\System32\$dll" $dest
          }

      - name: Build installer (Inno Setup)
        working-directory: dashboard/installers/windows
        run: iscc /DAppVersion=${{ steps.ver.outputs.version }} lycosa.iss

      - uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dashboard/installers/windows/output/Lycosa-windows-setup-*.exe
          if-no-files-found: error

  desktop-linux:
    name: Desktop installer (Linux AppImage + tar.gz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev imagemagick libfuse2

      - name: Set version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: dashboard
        run: |
          flutter pub get
          flutter build linux --release

      - name: Package tar.gz
        working-directory: dashboard
        run: |
          tar -czf "Lycosa-linux-${{ steps.ver.outputs.version }}.tar.gz" \
            -C build/linux/x64/release/bundle .

      - name: Package AppImage
        working-directory: dashboard
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          APPDIR=$(mktemp -d)/Lycosa.AppDir
          mkdir -p "$APPDIR/usr"
          cp -r build/linux/x64/release/bundle/* "$APPDIR/usr/"
          # placeholder icon until the project ships branded artwork
          convert -size 256x256 xc:'#4527A0' -fill white -gravity center \
            -pointsize 160 -annotate 0 'L' "$APPDIR/lycosa.png"
          printf '%s\n' '[Desktop Entry]' 'Name=Lycosa' 'Exec=lycosa_dashboard' \
            'Icon=lycosa' 'Type=Application' 'Categories=Utility;' \
            > "$APPDIR/lycosa.desktop"
          printf '%s\n' '#!/bin/sh' \
            'HERE=$(dirname "$(readlink -f "$0")")' \
            'exec "$HERE/usr/lycosa_dashboard" "$@"' \
            > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"
          curl -fsSL -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool "$APPDIR" \
            "Lycosa-linux-${VERSION}.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: |
            dashboard/Lycosa-linux-*.AppImage
            dashboard/Lycosa-linux-*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [backend-image, desktop-macos, desktop-windows, desktop-linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: installer-*
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            /^## \[/ { if (flag) exit }
            flag { print }
          ' CHANGELOG.md > release_notes.md
          if ! [ -s release_notes.md ]; then
            echo "See CHANGELOG.md for details." > release_notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: artifacts/*
          fail_on_unmatched_files: true
